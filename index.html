<!DOCTYPE html>
<html lang="en">
    <head>
        <title>POPCAT CLASSIC</title>
        <style>
            body {
                margin: 0;
                padding: 0;
                font-family: sans-serif;
                user-select: none;
            }
            .container {
                height: 100vh;
                display: flex;
                flex-direction: column;
                align-items: center;
                background-color: #bdaa90;
            }
            .title {
                width: 80%;
                margin-top: 2em;
                max-width: 600px;
            }
            .cat-img {
                width: 100%;
                flex: 1;
                text-align: center;
                color: white;
                font-size: 80px;
                -webkit-text-stroke: 3px black;
                background-image: url(imgs/p.png);
                background-position: bottom;
                background-size: contain;
                background-repeat: no-repeat;
                max-width: 800px;
            }
            #op {
                background-image: url(imgs/op.png);
            }
        </style>
    </head>
    <body>
        <div class="container">
            <img src="imgs/popcat.svg" alt="POPCAT CLASSIC" width="400px" class="title">
            <div class="cat-img" id="p">0</div>
        </div>
        <script>

            const display = document.getElementById('p');

            let count = 0;
            function increment() {
                count++;
                console.log(count);
                display.textContent = count; 
            }

    
            display.addEventListener('click', increment);

  
            function mouthOpen() {
                display.style.backgroundImage = 'url(imgs/op.png)';
            }
            function mouthClose() {
                display.style.backgroundImage = 'url(imgs/p.png)';
            }

       
            display.addEventListener('mousedown', () => {
                mouthOpen();
                increment(); 
            });
            display.addEventListener('mouseup', mouthClose);
            display.addEventListener('mouseleave', mouthClose); 
        </script>
    </body>
</html>
